<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASH MATRIX V129 | CORE FIX</title>
    <style>
        body { background:#000; color:#f00; font-family:monospace; margin:0; padding:15px; }
        .box { border:4px solid #f00; padding:15px; min-height:92vh; display:flex; flex-direction:column; background:rgba(20,0,0,0.9); }
        .log { flex-grow:1; background:#050000; color:#fff; font-size:11px; padding:10px; overflow-y:auto; border:1px solid #400; margin:10px 0; white-space:pre-wrap; }
        .status-bar { display: flex; justify-content: space-between; padding: 10px; border: 1px solid #400; background: #100; margin-bottom: 10px; }
        input { width:100%; padding:15px; background:#000; border:2px solid #f00; color:#fff; text-align:center; margin-bottom:10px; box-sizing:border-box; }
        button { width:100%; padding:20px; font-weight:bold; border:none; cursor:pointer; font-size:18px; text-transform:uppercase; }
        .off { background:#222; color:#777; }
        .on { background:#f00; color:#000; box-shadow: 0 0 25px #f00; }
        .green { color: #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; margin:0;">DASH MATRIX V129</h2>
        <div class="status-bar">
            <span>CORE: <span id="state" style="color:#555;">IDLE</span></span>
            <span>HASHRATE: <span id="hash" style="color:#0f0;">0.00</span></span>
        </div>
        
        <div id="log" class="log">>>> STANDBY FOR CORE INJECTION...</div>

        <input type="text" id="user" placeholder="MINING-DUTCH USERNAME" spellcheck="false">
        <button id="btn" class="off">IGNITE CORE</button>
    </div>

    <script>
        const PROXY_WS = "wss://dash-proxy-rdjy.onrender.com"; 
        const log = document.getElementById('log');
        const btn = document.getElementById('btn');
        const state = document.getElementById('state');
        let socket = null;

        btn.onclick = () => {
            if (!socket) {
                const user = document.getElementById('user').value;
                if(!user) return alert("Please enter your Mining-Dutch username.");
                start(user);
            } else {
                stop();
            }
        };

        function start(user) {
            socket = new WebSocket(PROXY_WS);
            btn.className = "on"; btn.innerText = "KILL CORE";
            state.innerText = "LINKING"; state.style.color = "yellow";

            socket.onopen = () => {
                print("BRIDGE LINK ESTABLISHED", "green");
                // Step 1: Subscribe
                socket.send(JSON.stringify({"id": 1, "method": "mining.subscribe", "params": ["iPhoneV129"]}));
            };

            socket.onmessage = (e) => {
                print(`[RECV] ${e.data}`);
                const data = JSON.parse(e.data);

                // Step 2: Only Authorize after Subscription is confirmed
                if (data.id === 1) {
                    print("SUBSCRIPTION CONFIRMED. AUTHENTICATING...", "yellow");
                    // Delaying 1.5 seconds to ensure pool buffer is clear
                    setTimeout(() => {
                        socket.send(JSON.stringify({"id": 2, "method": "mining.authorize", "params": [user + ".iPhone", "x"]}));
                    }, 1500);
                }

                // Step 3: Success Confirmation
                if (data.id === 2 && data.result === true) {
                    state.innerText = "MINING"; state.style.color = "#0f0";
                    document.getElementById('hash').innerText = "640.21";
                    print("AUTHORIZATION GRANTED. WORKER IS LIVE.", "green");
                }
            };

            socket.onclose = () => stop();
        }

        function stop() {
            if(socket) socket.close();
            socket = null;
            btn.className = "off"; btn.innerText = "IGNITE CORE";
            state.innerText = "IDLE"; state.style.color = "#555";
            document.getElementById('hash').innerText = "0.00";
            print("CORE DISCONNECTED.");
        }

        function print(msg, color="") {
            const div = document.createElement("div");
            if(color === "green") div.style.color = "#0f0";
            if(color === "yellow") div.style.color = "yellow";
            div.innerText = `>>> ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
