<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASH MATRIX V128</title>
    <style>
        body { background:#000; color:#f00; font-family:monospace; margin:0; padding:15px; }
        .box { border:4px solid #f00; padding:15px; min-height:90vh; display:flex; flex-direction:column; background:rgba(10,0,0,0.9); }
        .log { flex-grow:1; background:#050000; color:#fff; font-size:11px; padding:10px; overflow-y:auto; border:1px solid #400; margin:10px 0; white-space:pre-wrap; }
        .status-header { display: flex; justify-content: space-between; padding: 10px; border: 1px solid #400; font-weight: bold; }
        input { width:100%; padding:15px; background:#000; border:2px solid #f00; color:#fff; text-align:center; margin-bottom:10px; box-sizing:border-box; }
        button { width:100%; padding:20px; font-weight:bold; border:none; cursor:pointer; font-size:18px; }
        .off { background:#333; color:#fff; }
        .on { background:#f00; color:#000; box-shadow: 0 0 20px #f00; }
        .green { color: #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; margin:0;">DASH MATRIX V128</h2>
        <div class="status-header">
            <span>STATE: <span id="state" style="color:yellow;">STANDBY</span></span>
            <span>SHARES: <span id="shares">0</span></span>
        </div>
        
        <div id="log" class="log">>>> AWAITING USER INJECTION...</div>

        <input type="text" id="user" placeholder="MINING-DUTCH USERNAME" spellcheck="false">
        <button id="btn" class="off">IGNITE CORE</button>
    </div>

    <script>
        const PROXY_WS = "wss://dash-proxy-rdjy.onrender.com"; 
        const log = document.getElementById('log');
        const btn = document.getElementById('btn');
        const state = document.getElementById('state');
        let socket = null;

        btn.onclick = () => {
            if (!socket) {
                const user = document.getElementById('user').value;
                if(!user) return alert("Username required!");
                start(user);
            } else {
                stop();
            }
        };

        function start(user) {
            socket = new WebSocket(PROXY_WS);
            btn.className = "on"; btn.innerText = "KILL CORE";
            state.innerText = "LINKING";

            socket.onopen = () => {
                print("TUNNEL OPENED", "green");
                // STEP 1: SUBSCRIBE
                socket.send(JSON.stringify({"id": 1, "method": "mining.subscribe", "params": []}));
            };

            socket.onmessage = (e) => {
                print(`[RECV] ${e.data}`);
                const data = JSON.parse(e.data);

                // STEP 2: AUTHORIZE (With 1 second delay to avoid pool rejection)
                if (data.id === 1) {
                    print("SUBSCRIBE SUCCESS. WAITING FOR POOL SYNC...", "yellow");
                    setTimeout(() => {
                        socket.send(JSON.stringify({"id": 2, "method": "mining.authorize", "params": [user + ".iPhone", "x"]}));
                        print(`[SENT] Auth request for ${user}.iPhone`);
                    }, 1000);
                }

                // STEP 3: CONFIRMATION
                if (data.id === 2 && data.result === true) {
                    state.innerText = "MINING";
                    state.style.color = "#0f0";
                    print("AUTHENTICATION GRANTED. WORKER ACTIVE!", "green");
                }
            };

            socket.onclose = () => stop();
        }

        function stop() {
            if(socket) socket.close();
            socket = null;
            btn.className = "off"; btn.innerText = "IGNITE CORE";
            state.innerText = "OFFLINE";
            state.style.color = "#f00";
            print("CORE KILLED.");
        }

        function print(msg, color="") {
            const div = document.createElement("div");
            if(color) div.style.color = (color === "green") ? "#0f0" : "yellow";
            div.innerText = `>>> ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
